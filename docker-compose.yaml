services:

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  airflow-init:
    image: apache/airflow:2.9.3

    depends_on:
      - postgres

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Om
      --lastname Kapkoti
      --role Admin
      --email admin@example.com
      "

    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-webserver:

    image: apache/airflow:2.9.3

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    command: webserver

    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-scheduler:

    image: apache/airflow:2.9.3

    depends_on:
      - postgres

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    command: scheduler

    volumes:
      - ./airflow/dags:/opt/airflow/dags